<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proliance — Adjuster Specialist Interview</title>
  <style>
/* style.css — Proliance Interview Guide — Standalone Browser Version */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#ffffff; --bg2:#f7f7f6; --bg3:#f0efed;
  --text:#1a1a1a; --text2:#666666; --text3:#999999;
  --border:rgba(0,0,0,0.10); --border2:rgba(0,0,0,0.18);
  --radius:10px; --radius-sm:6px;
  --blue-bg:#E6F1FB; --blue:#185FA5;
  --green-bg:#EAF3DE; --green:#3B6D11;
  --amber-bg:#FAEEDA; --amber:#BA7517;
  --red-bg:#FCEBEB; --red:#A32D2D;
  --purple-bg:#EEEDFE; --purple:#534AB7;
  --teal-bg:#E1F5EE; --teal:#0F6E56;
  --gray-bg:#F1EFE8; --gray:#5F5E5A;
}

html,body { height:100%; font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg2); color:var(--text); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }

/* LOGIN */
#login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg2); }
.login-box { background:var(--bg); border:1px solid var(--border2); border-radius:14px; padding:40px 44px; width:360px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
.login-logo { font-size:11px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--text3); margin-bottom:28px; }
.login-title { font-size:22px; font-weight:700; color:var(--text); margin-bottom:6px; }
.login-sub { font-size:13px; color:var(--text2); margin-bottom:32px; }
.user-btns { display:flex; flex-direction:column; gap:10px; }
.user-btn { padding:12px; border-radius:var(--radius-sm); border:1px solid var(--border2); background:var(--bg); font-size:14px; font-weight:500; font-family:inherit; color:var(--text); cursor:pointer; transition:background .13s,border-color .13s; }
.user-btn:hover { background:var(--bg2); border-color:var(--blue); color:var(--blue); }

/* APP SHELL */
#app { display:none; flex-direction:column; position:fixed; inset:0; overflow:hidden; }
#app.visible { display:flex; }
.app-inner { display:flex; flex:1; overflow:hidden; min-height:0; }

/* TOP BAR */
.topbar { display:flex; align-items:center; gap:10px; padding:9px 16px; border-bottom:1px solid var(--border); background:var(--bg2); flex-shrink:0; flex-wrap:wrap; }
.topbar-left { display:flex; align-items:center; gap:8px; flex:1; min-width:0; flex-wrap:wrap; }
.topbar-right { display:flex; align-items:center; gap:6px; }
.topbar-logo { font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text3); white-space:nowrap; }
.cand-input { border:1px solid var(--border2); border-radius:var(--radius-sm); padding:5px 10px; font-size:13px; font-family:inherit; background:var(--bg); color:var(--text); width:160px; outline:none; transition:border-color .15s; }
.cand-input:focus { border-color:var(--blue); }
.pill { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap; }
.flag-bar { display:flex; gap:5px; }
.flag-btn { padding:4px 11px; border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid var(--border2); background:var(--bg); color:var(--text2); font-family:inherit; transition:all .13s; }
.flag-btn:hover { background:var(--bg2); }
.flag-btn[data-color="green"]:hover { background:var(--green-bg); color:var(--green); border-color:var(--green); }
.flag-btn[data-color="amber"]:hover { background:var(--amber-bg); color:var(--amber); border-color:var(--amber); }
.flag-btn[data-color="red"]:hover   { background:var(--red-bg);   color:var(--red);   border-color:var(--red); }
.hist-btn,.logout-btn { padding:5px 12px; border-radius:var(--radius-sm); font-size:12px; font-family:inherit; cursor:pointer; border:1px solid var(--border2); background:var(--bg); color:var(--text2); transition:background .13s; }
.hist-btn:hover,.logout-btn:hover { background:var(--bg3); }

/* FLAGS STRIP */
.flags-strip { padding:5px 16px; background:var(--bg2); border-bottom:1px solid var(--border); display:none; flex-wrap:wrap; gap:5px; flex-shrink:0; }
.flags-strip.visible { display:flex; }
.flag-chip { font-size:11px; font-weight:500; padding:2px 9px; border-radius:10px; }

/* PROGRESS */
.prog-bar { height:3px; background:var(--border); flex-shrink:0; }
.prog-fill { height:100%; background:var(--blue); transition:width .3s ease; }

/* SIDEBAR */
#sidebar { width:220px; min-width:220px; border-right:1px solid var(--border); overflow-y:auto; background:var(--bg); flex-shrink:0; }
.sb-sec { padding:12px 14px 4px; font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text3); }
.sb-item { display:flex; align-items:center; gap:8px; padding:7px 10px; margin:1px 6px; border-radius:var(--radius-sm); cursor:pointer; font-size:12.5px; color:var(--text2); transition:background .12s; }
.sb-item:hover { background:var(--bg2); }
.sb-item.active { background:var(--bg2); color:var(--text); font-weight:600; }
.sb-dot { width:7px; height:7px; border-radius:50%; background:#d0d0cc; flex-shrink:0; transition:background .2s; }
.sb-item.done .sb-dot { background:var(--green); }
.sb-item.active .sb-dot { background:var(--blue); }
.sb-rating { margin-left:auto; font-size:11px; font-weight:700; }
.sb-divider { height:1px; background:var(--border); margin:5px 12px; }

/* SCROLL AREA */
#scroll-area { flex:1; overflow-y:auto; padding:22px 26px 60px; background:var(--bg); }
.step-eye { font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text3); margin-bottom:5px; }
.step-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:18px; }

/* CARDS */
.card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; position:relative; transition:border-color .15s; }
.card:hover { border-color:var(--border2); }
.card:hover .edit-hint { opacity:1; }
.edit-hint { position:absolute; top:8px; right:10px; font-size:10px; color:var(--text3); opacity:0; transition:opacity .2s; pointer-events:none; }
.tag { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; margin-bottom:8px; letter-spacing:.04em; }
.t-ask    { background:var(--green-bg);  color:var(--green); }
.t-say    { background:var(--blue-bg);   color:var(--blue); }
.t-note   { background:var(--amber-bg);  color:var(--amber); }
.t-rule   { background:var(--red-bg);    color:var(--red); }
.t-listen { background:var(--gray-bg);   color:var(--gray); }
.t-exit   { background:var(--red-bg);    color:var(--red); }
.t-branch { background:var(--purple-bg); color:var(--purple); }
.t-context{ background:var(--teal-bg);   color:var(--teal); }
.q-text { font-size:15px; font-weight:600; color:var(--text); line-height:1.65; }
.kv-text { font-size:13px; color:var(--text2); line-height:1.75; }
.kv-text b,.kv-text strong { color:var(--text); font-weight:700; }
.editable { outline:none; border-radius:4px; }
.editable:focus { background:#f0f7ff; outline:2px solid var(--blue); outline-offset:3px; }

/* CHOICES */
.choice-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:13px 15px; margin-bottom:10px; }
.choice-q { font-size:13px; font-weight:700; color:var(--text); margin-bottom:10px; }
.opts { display:flex; flex-wrap:wrap; gap:7px; }
.opt-btn { padding:7px 14px; border-radius:var(--radius-sm); border:1px solid var(--border2); font-size:13px; font-family:inherit; cursor:pointer; background:var(--bg); color:var(--text); transition:all .13s; }
.opt-btn:hover { background:var(--bg3); }
.opt-btn.sel-g { border-color:var(--green); background:var(--green-bg); color:var(--green); font-weight:700; }
.opt-btn.sel-r { border-color:var(--red);   background:var(--red-bg);   color:var(--red);   font-weight:700; }
.opt-btn.sel-a { border-color:var(--amber); background:var(--amber-bg); color:var(--amber); font-weight:700; }
.opt-btn.sel-b { border-color:var(--blue);  background:var(--blue-bg);  color:var(--blue);  font-weight:700; }

/* EXIT BLOCK */
.exit-block { border-left:3px solid var(--red); background:var(--red-bg); border-radius:0 var(--radius-sm) var(--radius-sm) 0; padding:12px 14px; margin-top:10px; }
.exit-lbl { font-size:10px; font-weight:700; color:var(--red); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.exit-say { font-size:13px; color:var(--text); line-height:1.7; font-style:italic; }
.partial-note { border-left:3px solid var(--amber); background:var(--amber-bg); border-radius:0 var(--radius-sm) var(--radius-sm) 0; padding:10px 14px; margin-top:8px; font-size:13px; color:var(--text); line-height:1.65; }
.track-badge { display:inline-flex; padding:4px 11px; border-radius:var(--radius-sm); font-size:12px; font-weight:700; margin-bottom:13px; }
.tb-exp { background:var(--blue-bg); color:var(--blue); }
.tb-partial { background:var(--teal-bg); color:var(--teal); }
.tb-noexp { background:var(--amber-bg); color:var(--amber); }

/* RATING */
.rating-row { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
.r-btn { padding:7px 16px; border-radius:var(--radius-sm); border:1px solid var(--border2); font-size:13px; font-family:inherit; cursor:pointer; background:var(--bg); color:var(--text2); transition:all .13s; }
.r-btn:hover { background:var(--bg2); }
.r-s.on { border-color:var(--green); background:var(--green-bg); color:var(--green); font-weight:700; }
.r-c.on { border-color:var(--amber); background:var(--amber-bg); color:var(--amber); font-weight:700; }
.r-e.on { border-color:var(--red);   background:var(--red-bg);   color:var(--red);   font-weight:700; }

/* NOTES */
.notes-lbl { font-size:11px; font-weight:600; color:var(--text3); margin:13px 0 5px; }
textarea { width:100%; border:1px solid var(--border2); border-radius:var(--radius-sm); padding:9px 11px; font-size:13px; font-family:inherit; color:var(--text); background:var(--bg); resize:vertical; min-height:64px; line-height:1.6; outline:none; transition:border-color .15s; }
textarea:focus { border-color:var(--blue); }

/* NAV */
.nav-row { display:flex; gap:9px; margin-top:20px; }
.btn-primary { padding:9px 20px; border-radius:var(--radius-sm); background:#1a1a1a; color:#ffffff; border:none; font-size:13px; font-family:inherit; font-weight:700; cursor:pointer; transition:opacity .15s; }
.btn-primary:hover { opacity:.82; }
.btn-sec { padding:9px 14px; border-radius:var(--radius-sm); background:transparent; color:var(--text2); border:1px solid var(--border2); font-size:13px; font-family:inherit; cursor:pointer; transition:background .13s; }
.btn-sec:hover { background:var(--bg2); }

/* SCORE */
.sum-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:11px; }
.sum-card { background:var(--bg2); border-radius:var(--radius-sm); padding:10px 12px; }
.sum-lbl { font-size:11px; font-weight:600; color:var(--text3); margin-bottom:3px; }
.sum-val { font-size:17px; font-weight:700; }

/* DEBRIEF */
.debrief-q { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; }
.db-lbl { font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--purple); margin-bottom:6px; }
.db-q { font-size:14px; font-weight:600; color:var(--text); margin-bottom:10px; line-height:1.55; }
.d-opts { display:flex; flex-wrap:wrap; gap:7px; }
.d-btn { padding:7px 13px; border-radius:var(--radius-sm); border:1px solid var(--border2); font-size:13px; font-family:inherit; cursor:pointer; background:var(--bg); color:var(--text); transition:all .13s; }
.d-btn:hover { background:var(--bg2); }
.d-g { border-color:var(--green); background:var(--green-bg); color:var(--green); font-weight:700; }
.d-a { border-color:var(--amber); background:var(--amber-bg); color:var(--amber); font-weight:700; }
.d-r { border-color:var(--red);   background:var(--red-bg);   color:var(--red);   font-weight:700; }

/* VERDICT */
.verdict-box { border-radius:var(--radius); padding:18px 20px; margin-top:14px; border:1px solid var(--border); }
.verdict-pending { font-size:12.5px; color:var(--text3); padding:11px 14px; border:1px dashed var(--border2); border-radius:var(--radius-sm); margin-top:10px; }

/* BUTTONS */
.pdf-btn { padding:9px 18px; border-radius:var(--radius-sm); background:var(--blue); color:#ffffff; border:none; font-size:13px; font-family:inherit; font-weight:700; cursor:pointer; margin-top:14px; margin-right:8px; transition:opacity .15s; }
.pdf-btn:hover { opacity:.85; }
.save-cand-btn { padding:9px 18px; border-radius:var(--radius-sm); background:var(--green); color:#ffffff; border:none; font-size:13px; font-family:inherit; font-weight:700; cursor:pointer; margin-top:14px; transition:opacity .15s; }
.save-cand-btn:hover { opacity:.85; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg); border-radius:var(--radius); padding:26px; width:580px; max-width:94vw; max-height:80vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,.14); }
.modal-title { font-size:16px; font-weight:700; margin-bottom:16px; }
.modal-close { float:right; background:none; border:none; font-size:20px; cursor:pointer; color:var(--text2); line-height:1; }
.hist-item { border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:background .13s; }
.hist-item:hover { background:var(--bg2); }
.hist-name { font-size:14px; font-weight:700; }
.hist-meta { font-size:12px; color:var(--text2); margin-top:3px; }
.hist-empty { font-size:13px; color:var(--text3); text-align:center; padding:28px; }

/* COMP TABLE */
.comp-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:9px; }
.comp-table th { text-align:left; padding:6px 10px; background:var(--bg2); color:var(--text2); font-weight:700; border-bottom:1px solid var(--border); font-size:11px; }
.comp-table td { padding:6px 10px; border-bottom:1px solid var(--border); color:var(--text); }
.up { color:var(--green); font-weight:700; }
.dn { color:var(--red);   font-weight:700; }

@media (max-width:640px) { #sidebar { display:none; } .cand-input { width:110px; } }

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Proliance General Contractors</div>
    <div class="login-title">Interview Guide</div>
    <div class="login-sub">Adjuster Specialist · Select your name to continue</div>
    <div class="user-btns" id="user-btns"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">Proliance</span>
      <input class="cand-input" id="cand-name" placeholder="Candidate name...">
      <span id="exp-pill" class="pill" style="display:none"></span>
      <span id="verdict-pill" class="pill" style="display:none"></span>
      <div class="flag-bar">
        <button class="flag-btn" data-color="green">+ Green</button>
        <button class="flag-btn" data-color="amber">+ Yellow</button>
        <button class="flag-btn" data-color="red">+ Red</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="hist-btn" onclick="openHistory()">History</button>
      <button class="hist-btn" id="new-interview-btn">+ New</button>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <!-- FLAGS STRIP -->
  <div class="flags-strip" id="flags-strip"></div>

  <!-- PROGRESS -->
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <!-- BODY -->
  <div class="app-inner">
    <div id="sidebar"></div>
    <div id="scroll-area"></div>
  </div>

</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="hist-modal" onclick="if(event.target===this)closeHistory()">
  <div class="modal">
    <button class="modal-close" onclick="closeHistory()">×</button>
    <div class="modal-title">Your interviews</div>
    <div id="hist-list"></div>
  </div>
</div>


<script>
// data.js — All script content lives here. Edit freely.
// Double-click any card in the app to edit inline too.

const SCRIPT_DATA = {
  steps: [
    {
      id: 'consent',
      label: 'Comp consent',
      section: 'Fast filter',
      cards: [
        { type: 'ask', text: 'Before we go any further — I want to be upfront with you, [name]. Since you applied, we\'ve updated our compensation structure. The base moved from $900 to $800 weekly, but the performance payouts increased across the board. Are you still happy to move forward under the new structure?' },
        { type: 'note', text: 'If they ask about the breakdown — toggle the comp table. If hesitant or no — exit immediately. No extra handling needed.' },
      ],
      compTable: true,
      choices: [
        { key: 'showTable', question: 'Did they ask about the breakdown?', options: [{ val: 'yes', label: 'Yes — show table', color: 'blue' }, { val: 'no', label: 'No — moving on', color: 'green' }] },
        { key: 'consent', question: 'Their response?', options: [{ val: 'yes', label: 'Yes — proceed', color: 'green' }, { val: 'hesitant', label: 'Hesitant', color: 'red' }, { val: 'no', label: 'No — opts out', color: 'red' }] },
      ],
      exits: {
        hesitant: 'Totally fair, [name] — I appreciate you being upfront about that. No pressure at all. If anything changes down the road, feel free to reach back out.',
        no: 'Totally fair, [name] — I appreciate you being upfront about that. No pressure at all. If anything changes down the road, feel free to reach back out.',
      }
    },
    {
      id: 'intent',
      label: 'Intentionality',
      section: 'Fast filter',
      cards: [
        { type: 'ask', text: '[name], what made you apply for this role specifically — what caught your attention?' },
        { type: 'note', text: 'Listening for two things: did [name] mention <b>public adjusting or this specific role by name</b>, and can they explain <b>why this direction</b> rather than something else.' },
        { type: 'listen', text: '<b>Intentional:</b> Names the company, the role, or the field. Knows what a public adjuster does. Applied to <b>similar roles in the same space</b> — still counts.<br><b>Spray and pray:</b> "I\'ve been applying to a lot of things" — <b>can\'t say why this over others</b>.' },
      ],
      choices: [
        { key: 'intent', question: 'How did they answer?', options: [{ val: 'intentional', label: 'Intentional', color: 'green' }, { val: 'spray', label: 'Spray and pray', color: 'red' }] },
      ],
      exits: {
        spray: '[name], we\'re specifically looking for people who\'ve researched this space and are moving toward it with a clear reason — it makes a big difference in how people handle the role long-term. I don\'t think this is the right timing.',
      }
    },
    {
      id: 'background',
      label: 'Background read',
      section: 'Fast filter',
      cards: [
        { type: 'ask', text: '[name], walk me through your most recent role — what you were doing day to day and how long you were there.' },
        { type: 'ask', text: 'What did you enjoy most about it?' },
        { type: 'ask', text: 'What parts did you find most challenging?' },
        { type: 'ask', text: 'And what eventually led you to move on?' },
        { type: 'listen', text: '<b>Applicable:</b> field work, roofing, inspection, insurance, property-related, client-facing outdoors.<br><b>Red flags:</b> <b>blame-heavy</b>, vague with no ownership, <b>dismissive of former team or manager</b>. How [name] talks about people tells you more than the role itself.' },
      ],
      choices: [
        { key: 'exp', question: 'Applicable experience?', options: [{ val: 'yes', label: 'Field / inspection / roofing', color: 'green' }, { val: 'partial', label: 'Partial — some transferable', color: 'amber' }, { val: 'no', label: 'No relevant background', color: 'red' }] },
      ],
      exits: {
        no: '[name], this role requires you to be field-ready from day one — rooftops, ladders, inspections under pressure. Without a background that gets you close to that, the ramp-up is too steep for where we are right now. I don\'t want to set you up for a tough situation.',
      },
      partialNote: 'Partial track: Continue — but pay closer attention in <b>Field Readiness</b> (how physical are they really?) and <b>Learning Speed</b> (can they close the gap fast without hand-holding?). Those two sections carry more weight for [name].'
    },
    {
      id: 'gap',
      label: 'Gap & motivation',
      section: 'Fast filter',
      cards: [
        { type: 'ask', text: '[name], what\'s not working anymore — what actually made you start looking?' },
        { type: 'rule', text: 'Mirror back exactly what [name] said. <b>Repeat their key words — don\'t paraphrase.</b> This prompts them to go deeper on their own.' },
      ],
      choices: [
        { key: 'gap', question: 'Is the pain clear and specific?', options: [{ val: 'clear', label: 'Clear — real specific pain', color: 'green' }, { val: 'vague', label: 'Vague — nothing urgent', color: 'amber' }] },
      ],
      vagueFollowup: {
        choices: [{ key: 'leavingReason', question: 'What\'s driving the move?', options: [{ val: 'financial', label: 'Financial', color: 'blue' }, { val: 'growth', label: 'Growth', color: 'blue' }, { val: 'environment', label: 'Environment / challenge', color: 'blue' }, { val: 'unclear', label: 'No real reason', color: 'red' }] }],
        exits: { unclear: '[name], if you can\'t name what\'s not working yet, this role is going to feel like a gamble — and that\'s not fair to you. Take some time to get clear on what you\'re actually moving toward. If that becomes clear, feel free to reach back out.' },
        financial: {
          cards: [
            { type: 'ask', text: '[name], what specifically about your income right now isn\'t working?' },

// script.js — App logic for Proliance Interview Guide

const S = {
  current: 0,
  notes: {},
  ratings: {},
  choices: {},
  debriefAnswers: {},
  candName: '',
  hasExp: null,
  flags: [],
  user: null,
};

// ── STORAGE ──────────────────────────────────────────────────────────────────

function storageKey(k) { return `proliance_${S.user}_${k}`; }

function save(key, val) {
  try { localStorage.setItem(storageKey(key), JSON.stringify(val)); } catch(e) {}
}

function load(key, fallback) {
  try {
    const v = localStorage.getItem(storageKey(key));
    return v !== null ? JSON.parse(v) : fallback;
  } catch(e) { return fallback; }
}

function saveSession() {
  save('session', {
    current: S.current, notes: S.notes, ratings: S.ratings,
    choices: S.choices, debriefAnswers: S.debriefAnswers,
    candName: S.candName, hasExp: S.hasExp, flags: S.flags,
  });
}

function loadSession() {
  const s = load('session', null);
  if (s) {
    Object.assign(S, s);
    document.getElementById('cand-name').value = S.candName || '';
    updateExpPill();
    updateVerdictPill();
    renderFlags();
  }
}

function saveHistory(candidate) {
  const hist = load('history', []);
  const idx = hist.findIndex(h => h.id === candidate.id);
  if (idx >= 0) hist[idx] = candidate; else hist.unshift(candidate);
  save('history', hist.slice(0, 100));
}

function loadHistory() { return load('history', []); }

function newSession() {
  S.current = 0; S.notes = {}; S.ratings = {}; S.choices = {};
  S.debriefAnswers = {}; S.candName = ''; S.hasExp = null; S.flags = [];
  document.getElementById('cand-name').value = '';
  updateExpPill(); updateVerdictPill(); renderFlags();
  saveSession();
  goTo(0);
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────

function login(user) {
  S.user = user;
  save('lastUser', user);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  loadSession();
  renderStep();
  renderSidebar();
}

function logout() {
  saveSession();
  S.user = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
}

// ── NAME HELPERS ──────────────────────────────────────────────────────────────

function fn() { return S.candName ? S.candName.split(' ')[0] : '[name]'; }
function injectName(text) { return text.replace(/\[name\]/g, `<b style="color:#185FA5">${fn()}</b>`); }
function injectNamePlain(text) { return text.replace(/\[name\]/g, fn()); }

// ── FLAGS ─────────────────────────────────────────────────────────────────────

function addFlag(color) {
  const step = SCRIPT_DATA.steps[S.current];
  S.flags.push({ color, step: step.label, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
  renderFlags();
  saveSession();
}

function renderFlags() {
  const strip = document.getElementById('flags-strip');
  if (!S.flags.length) { strip.classList.remove('visible'); return; }
  strip.classList.add('visible');
  const cmap = { green: ['#EAF3DE','#3B6D11','Green'], amber: ['#FAEEDA','#BA7517','Yellow'], red: ['#FCEBEB','#A32D2D','Red'] };
  strip.innerHTML = S.flags.map(f => {
    const [bg, color, label] = cmap[f.color];
    return `<span class="flag-chip" style="background:${bg};color:${color}">${label} · ${f.step} · ${f.time}</span>`;
  }).join('');
}

// ── PILLS ─────────────────────────────────────────────────────────────────────

function updateExpPill() {
  const el = document.getElementById('exp-pill');
  if (!el) return;
  const v = S.hasExp;
  if (!v) { el.style.display = 'none'; return; }
  el.style.display = 'inline-block';
  const map = { yes: ['#E6F1FB','#185FA5','Experienced'], partial: ['#E1F5EE','#0F6E56','Partial exp'], no: ['#FCEBEB','#A32D2D','No experience'] };
  const [bg, color, label] = map[v];
  Object.assign(el.style, { background: bg, color });
  el.textContent = label;
}

function updateVerdictPill() {
  const el = document.getElementById('verdict-pill');
  if (!el) return;
  const s = Object.values(S.ratings).filter(r => r === 'strong').length;
  const c = Object.values(S.ratings).filter(r => r === 'caution').length;
  const e = Object.values(S.ratings).filter(r => r === 'exit').length;
  if (s + c + e === 0) { el.style.display = 'none'; return; }
  el.style.display = 'inline-block';
  if (e > 0) { el.style.background = '#FCEBEB'; el.style.color = '#A32D2D'; el.textContent = 'Exit triggered'; }
  else if (s >= 8) { el.style.background = '#EAF3DE'; el.style.color = '#3B6D11'; el.textContent = 'Strong hire'; }
  else if (s >= 6) { el.style.background = '#FAEEDA'; el.style.color = '#BA7517'; el.textContent = 'Proceed w/ caution'; }
  else { el.style.background = '#FCEBEB'; el.style.color = '#A32D2D'; el.textContent = 'Do not proceed'; }
}

// ── CARD BUILDERS ─────────────────────────────────────────────────────────────

function cardHTML(type, text, editable = true) {
  const tagLabels = { ask: 'ASK', say: 'SAY', note: 'NOTE', rule: 'RULE', listen: 'LISTEN FOR', exit: 'EXIT', branch: 'EXPERIENCED TRACK', context: 'ROLE BRIEFING' };
  const isAsk = type === 'ask';
  const textClass = isAsk ? 'q-text' : 'kv-text';
  const editAttr = editable ? 'contenteditable="true"' : '';
  const editHint = editable ? '<span class="edit-hint">click to edit</span>' : '';
  return `<div class="card">${editHint}<span class="tag t-${type}">${tagLabels[type] || type.toUpperCase()}</span><div class="${textClass} editable" ${editAttr}>${injectName(text)}</div></div>`;
}

function exitBlockHTML(script) {
  return `<div class="exit-block"><div class="exit-lbl">Exit — say verbatim</div><div class="exit-say editable" contenteditable="true">${injectName(script)}</div></div>`;
}

function choiceHTML(key, question, options) {
  const cur = S.choices[key];
  const colorMap = { green: 'sel-g', red: 'sel-r', amber: 'sel-a', blue: 'sel-b' };
  const btns = options.map(o => {
    const sel = cur === o.val ? colorMap[o.color] || '' : '';
    return `<button class="opt-btn ${sel}" onclick="setChoice('${key}','${o.val}')">${o.label}</button>`;
  }).join('');
  return `<div class="choice-card"><div class="choice-q">${question}</div><div class="opts">${btns}</div></div>`;
}

function ratingHTML(id, exitScript) {
  const r = S.ratings[id];
  return `<div style="margin-top:6px">
    <div style="font-size:11px;color:var(--text3);margin-bottom:5px">Your rating</div>
    <div class="rating-row">
      <button class="r-btn r-s ${r==='strong'?'on':''}" onclick="rate('${id}','strong')">Strong</button>
      <button class="r-btn r-c ${r==='caution'?'on':''}" onclick="rate('${id}','caution')">Caution</button>
      <button class="r-btn r-e ${r==='exit'?'on':''}" onclick="rate('${id}','exit')">Exit</button>
    </div>
    ${r === 'exit' && exitScript ? exitBlockHTML(exitScript) : ''}
  </div>`;
}

function noteHTML(id) {
  return `<div class="notes-lbl">Your notes</div><textarea placeholder="Write here..." onchange="S.notes['${id}']=this.value;saveSession()">${S.notes[id] || ''}</textarea>`;
}

function trackBadge() {
  const v = S.hasExp;
  if (!v) return '';
  const map = { yes: ['tb-exp', 'Experienced track'], partial: ['tb-partial', 'Partial experience track'], no: ['tb-noexp', 'No experience track'] };
  const [cls, label] = map[v];
  return `<div class="track-badge ${cls}">${label}</div>`;
}

// ── STEP RENDERERS ────────────────────────────────────────────────────────────

function renderStepContent(step) {

  let html = '';

  // Track badge for vetting steps
  if (step.section === 'Vetting' && step.id !== 'roleexplain') html += trackBadge();

  // Render main cards
  if (step.cards) step.cards.forEach(c => { html += cardHTML(c.type, c.text); });

  // Step-specific rendering
  if (step.id === 'consent') html += renderConsent(step);
  if (step.id === 'intent') html += renderIntent(step);
  if (step.id === 'background') html += renderBackground(step);
  if (step.id === 'gap') html += renderGap(step);
  if (step.id === 'roleexplain') html += renderRoleExplain(step);
  if (step.id === 'final') html += renderFinal(step);
  if (step.id === 'debrief') html += renderDebrief(step);

  // Exp/no-exp branched cards for vetting steps
  if (['pressure','conviction','field','learning','docs','resilience'].includes(step.id)) {
    if (exp === 'yes' && step.expCards) step.expCards.forEach(c => { html += cardHTML(c.type, c.text || c.label || ''); });
    if ((exp === 'no' || exp === 'partial') && step.noExpCards) step.noExpCards.forEach(c => { html += cardHTML(c.type, c.text); });
    if (step.sharedListenCards) step.sharedListenCards.forEach(c => { html += cardHTML(c.type, c.text); });
  }

  // Rating block for rated steps
  if (step.rated) html += ratingHTML(step.id, step.exitScript || '');

  // Notes
  if (step.id !== 'debrief') html += noteHTML(step.id);

  return html;
}

function renderConsent(step) {
  let html = '';
  step.choices.forEach(ch => { html += choiceHTML(ch.key, ch.question, ch.options); });
  if (S.choices['showTable'] === 'yes') {
    html += `<div class="card"><span class="tag t-note">COMP TABLE</span>
      <table class="comp-table">
        <tr><th></th><th>Old</th><th>New</th><th>Change</th></tr>
        <tr><td colspan="4" style="font-size:11px;color:var(--text3);padding-top:6px">Option 1 — Base</td></tr>
        <tr><td>Base pay</td><td>$900/wk</td><td>$800/wk</td><td class="dn">−$100</td></tr>
        <tr><td>Full approval</td><td>$100</td><td>$150</td><td class="up">+$50</td></tr>
        <tr><td>Partial approval</td><td>$50</td><td>$50</td><td>—</td></tr>
        <tr><td>Denial</td><td>—</td><td>$20</td><td class="up">New</td></tr>
        <tr><td colspan="4" style="font-size:11px;color:var(--text3);padding-top:6px">Option 2 — Commission only</td></tr>
        <tr><td>Full approval</td><td>$200</td><td>$250</td><td class="up">+$50</td></tr>
        <tr><td>Partial approval</td><td>$100</td><td>$150</td><td class="up">+$50</td></tr>
        <tr><td>Denial</td><td>$50</td><td>$50</td><td>—</td></tr>
      </table></div>`;
  }
  const resp = S.choices['consent'];
  if (resp === 'hesitant' || resp === 'no') html += exitBlockHTML(step.exits[resp] || '');
  return html;
}

function renderIntent(step) {
  let html = '';
  step.choices.forEach(ch => { html += choiceHTML(ch.key, ch.question, ch.options); });
  if (S.choices['intent'] === 'spray') html += exitBlockHTML(step.exits.spray || '');
  return html;
}

function renderBackground(step) {
  let html = '';
  step.choices.forEach(ch => { html += choiceHTML(ch.key, ch.question, ch.options); });
  const exp = S.choices['exp'];
  if (exp === 'no') html += exitBlockHTML(step.exits.no || '');
  if (exp === 'partial' && step.partialNote) {
    html += `<div class="partial-note">${injectName(step.partialNote)}</div>`;
  }
  return html;
}

function renderGap(step) {
  let html = '';
  step.choices.forEach(ch => { html += choiceHTML(ch.key, ch.question, ch.options); });
  if (S.choices['gap'] !== 'vague') return html;
  const vf = step.vagueFollowup;
  html += `<div class="card" style="border-color:var(--amber)"><span class="tag t-note">GAP BRANCH</span><div class="kv-text">Gap is unclear. Find the reason for leaving — then test if it's urgent.</div></div>`;
  vf.choices.forEach(ch => { html += choiceHTML(ch.key, ch.question, ch.options); });
  const reason = S.choices['leavingReason'];
  if (!reason) return html;
  if (reason === 'unclear') { html += exitBlockHTML(vf.exits.unclear || ''); return html; }
  const branch = vf[reason];
  if (!branch) return html;
  if (branch.cards) branch.cards.forEach(c => { html += cardHTML(c.type, c.text); });
  if (branch.choices) branch.choices.forEach(ch => { html += choiceHTML(ch.key, ch.question, ch.options); });
  if (branch.exits) {
    Object.entries(branch.exits).forEach(([val, script]) => {
      if (S.choices[branch.choices?.[0]?.key] === val) html += exitBlockHTML(script);
    });
  }
  if (reason === 'financial' && branch.urgency && S.choices['finPain'] === 'yes') {
    const urg = branch.urgency;
    if (urg.cards) urg.cards.forEach(c => { html += cardHTML(c.type, c.text); });
    if (urg.choices) urg.choices.forEach(ch => { html += choiceHTML(ch.key, ch.question, ch.options); });
    if (S.choices['urgency'] === 'later' && urg.exits?.later) html += exitBlockHTML(urg.exits.later);
  }
  return html;
}

function renderRoleExplain(step) {
  const exp = S.hasExp;
  let html = '';
  if (exp === 'yes') {
    html += trackBadge();
    if (step.expCards) step.expCards.forEach(c => { html += cardHTML(c.type, c.text); });
  } else {
    if (exp === 'partial') html += `<div class="track-badge tb-partial">Partial experience track</div>`;
    else if (exp === 'no') html += `<div class="track-badge tb-noexp">No experience track</div>`;
    if (step.noExpCards) step.noExpCards.forEach(c => { html += cardHTML(c.type, c.text); });
  }
  return html;
}

function renderFinal(step) {
  const s = Object.values(S.ratings).filter(r => r === 'strong').length;
  const c = Object.values(S.ratings).filter(r => r === 'caution').length;
  const e = Object.values(S.ratings).filter(r => r === 'exit').length;
  let d = {};
  if (e > 0) d = { bg: '#FCEBEB', c: '#A32D2D', title: 'Do not proceed', sub: 'An exit was triggered. Interview confidence does not override exit signals.' };
  else if (s >= 8 && c <= 2) d = { bg: '#EAF3DE', c: '#3B6D11', title: 'Strong hire', sub: 'Composure, field readiness, learning ability, and process discipline all present.' };
  else if (s >= 6) d = { bg: '#FAEEDA', c: '#BA7517', title: 'Proceed with caution', sub: 'Probe flagged caution areas in a second conversation before deciding.' };
  else d = { bg: '#FCEBEB', c: '#A32D2D', title: 'Do not proceed', sub: 'Fewer than 6 strong ratings. Interview confidence does not override weak signals.' };
  return `<div class="card"><span class="tag t-note">SCORE SUMMARY</span>
    <div class="sum-grid">
      <div class="sum-card"><div class="sum-lbl">Strong</div><div class="sum-val" style="color:var(--green)">${s}</div></div>
      <div class="sum-card"><div class="sum-lbl">Caution</div><div class="sum-val" style="color:var(--amber)">${c}</div></div>
      <div class="sum-card"><div class="sum-lbl">Exit triggers</div><div class="sum-val" style="color:var(--red)">${e}</div></div>
      <div class="sum-card"><div class="sum-lbl">Sections rated</div><div class="sum-val">${s+c+e} of 10</div></div>
    </div>
    <div style="margin-top:10px;padding:11px 13px;border-radius:var(--radius-sm);background:${d.bg};border:0.5px solid ${d.c}40">
      <div style="font-size:10px;font-weight:600;color:${d.c};text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Score decision</div>
      <div style="font-size:14px;font-weight:600;color:${d.c};margin-bottom:3px">${d.title}</div>
      <div style="font-size:12.5px;color:var(--text2);line-height:1.6">${d.sub}</div>
    </div>
  </div>
  ${ratingHTML('final', step.exitScript)}`;
}

function renderDebrief(step) {
  const a = S.debriefAnswers;
  const qHTML = step.questions.map(q => {
    const cur = a[q.key];
    const btns = q.opts.map(o => {
      const sel = cur === o.v ? `d-${o.v}` : '';
      return `<button class="d-btn ${sel}" onclick="setDebrief('${q.key}','${o.v}')">${o.l}</button>`;
    }).join('');
    return `<div class="debrief-q"><div class="db-lbl">Reflect</div><div class="db-q">${injectName(q.text)}</div><div class="d-opts">${btns}</div></div>`;
  }).join('');

  const answered = Object.keys(a).length;
  let verdictHTML = '';
  if (answered >= 3) {
    const gs = Object.values(a).filter(v => v === 'g').length;
    const rs = Object.values(a).filter(v => v === 'r').length;
    let v = {};
    if (rs >= 2) v = { bg: '#FCEBEB', c: '#A32D2D', title: 'Reject', sub: `Your gut and your notes are pointing the same direction — ${fn()} is not the right fit right now. Trust that.` };
    else if (gs >= 4) v = { bg: '#EAF3DE', c: '#3B6D11', title: 'Move forward', sub: `Across the board, ${fn()} showed up. Your instincts and the signals are aligned. Proceed with confidence.` };
    else v = { bg: '#FAEEDA', c: '#BA7517', title: '50/50 — needs more', sub: `There's enough here to be curious, but not enough to be confident. A second conversation focused on the flagged areas will tell you more.` };
    verdictHTML = `<div class="verdict-box" style="background:${v.bg};border-color:${v.c}40">
      <div style="font-size:10px;font-weight:600;color:${v.c};text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Your gut verdict</div>
      <div style="font-size:20px;font-weight:600;color:${v.c};margin-bottom:5px">${v.title}</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6">${v.sub}</div>
    </div>`;
  } else {
    verdictHTML = `<div class="verdict-pending">Answer at least 3 questions to generate your verdict.</div>`;
  }

  return `<div style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">Call is done. Step back and answer honestly — your gut matters as much as the scores.</div>
  ${qHTML}${verdictHTML}
  <div style="margin-top:12px">
    <button class="pdf-btn" onclick="generatePDF()">Export PDF summary</button>
    <button class="save-cand-btn" onclick="saveCandidate()">Save to history</button>
  </div>
  ${noteHTML('debrief')}`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────

function setChoice(key, val) {
  S.choices[key] = val;
  if (key === 'exp') { S.hasExp = val; updateExpPill(); }
  saveSession(); renderStep();
}

function setDebrief(key, val) {
  S.debriefAnswers[key] = val;
  saveSession(); renderStep();
}

function rate(id, val) {
  S.ratings[id] = val;
  saveSession(); updateVerdictPill(); renderStep();
}

function saveCandidate() {
  if (!S.candName.trim()) { alert('Enter a candidate name first.'); return; }
  const s = Object.values(S.ratings).filter(r => r === 'strong').length;
  const e = Object.values(S.ratings).filter(r => r === 'exit').length;
  const a = S.debriefAnswers;
  const gs = Object.values(a).filter(v => v === 'g').length;
  const rs = Object.values(a).filter(v => v === 'r').length;
  let verdict = 'Pending';
  if (Object.keys(a).length >= 3) {
    if (rs >= 2) verdict = 'Reject';
    else if (gs >= 4) verdict = 'Move forward';
    else verdict = '50/50';
  }
  const c = Object.values(S.ratings).filter(r => r === 'caution').length;
  const candidate = {
    id: Date.now(),
    name: S.candName,
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
    interviewer: S.user || '',
    exp: S.hasExp,
    strong: s,
    caution: c,
    exits: e,
    verdict,
    notes: { ...S.notes },
    ratings: { ...S.ratings },
    flags: [...(S.flags || [])],
  };
  saveHistory(candidate);
  alert(`${S.candName} saved to your history.`);
}

// ── HISTORY MODAL ─────────────────────────────────────────────────────────────

function openHistory() {
  const hist = loadHistory();
  const modal = document.getElementById('hist-modal');
  const list = document.getElementById('hist-list');
  if (!hist.length) {
    list.innerHTML = '<div class="hist-empty">No interviews saved yet.</div>';
    modal.classList.add('open');
    return;
  }
  const expLabel = { yes: 'Experienced', partial: 'Partial exp', no: 'No experience' };
  const vColors = { 'Move forward': '#3B6D11', 'Reject': '#A32D2D', '50/50': '#BA7517', 'Pending': '#999' };
  const rColor = r => r === 'strong' ? '#3B6D11' : r === 'caution' ? '#BA7517' : r === 'exit' ? '#A32D2D' : '#999';

  list.innerHTML = '';
  hist.forEach((h, idx) => {
    const item = document.createElement('div');
    item.className = 'hist-item';
    item.style.cursor = 'pointer';

    const vc = vColors[h.verdict] || '#999';
    const header = document.createElement('div');
    header.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="hist-name">${h.name || 'Unnamed'}</div>
          <span style="font-size:11px;font-weight:600;color:${vc}">${h.verdict || 'Pending'}</span>
        </div>
        <span style="font-size:18px;color:#aaa;font-weight:300" class="hist-chevron">+</span>
      </div>
      <div class="hist-meta">${h.date || ''}${h.interviewer ? ' · ' + h.interviewer : ''} · ${expLabel[h.exp]||'—'} · ${h.strong||0} strong · ${h.exits||0} exits</div>
    `;

    const detail = document.createElement('div');
    detail.style.cssText = 'display:none;margin-top:12px;padding-top:12px;border-top:1px solid #eee';

    // Flags
    if (h.flags && h.flags.length) {
      const flbl = document.createElement('div');
      flbl.style.cssText = 'font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:6px';
      flbl.textContent = 'Flags';
      detail.appendChild(flbl);
      const frow = document.createElement('div');
      frow.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px';
      h.flags.forEach(f => {
        const chip = document.createElement('span');
        const [bg, col] = f.color === 'green' ? ['#EAF3DE','#3B6D11'] : f.color === 'amber' ? ['#FAEEDA','#BA7517'] : ['#FCEBEB','#A32D2D'];
        chip.style.cssText = `background:${bg};color:${col};font-size:11px;padding:2px 9px;border-radius:10px;font-weight:500`;
        chip.textContent = (f.color === 'green' ? 'Green' : f.color === 'amber' ? 'Yellow' : 'Red') + ' · ' + (f.step || '') + (f.time ? ' · ' + f.time : '');
        frow.appendChild(chip);
      });
      detail.appendChild(frow);
    }

    // Ratings and notes per section
    const ratedSteps = (SCRIPT_DATA.steps || []).filter(st => st.rated);
    const hasRatings = ratedSteps.some(st => h.ratings && h.ratings[st.id]);
    if (hasRatings || (h.notes && Object.keys(h.notes).length)) {
      const rlbl = document.createElement('div');
      rlbl.style.cssText = 'font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:8px';
      rlbl.textContent = 'Ratings & notes';
      detail.appendChild(rlbl);

      ratedSteps.forEach(st => {
        const r = h.ratings && h.ratings[st.id];
        const n = h.notes && h.notes[st.id];
        if (!r && !n) return;
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f0f0f0;align-items:flex-start';
        const nameCol = document.createElement('div');
        nameCol.style.cssText = 'font-size:12px;color:#555;min-width:130px;flex-shrink:0;padding-top:1px';
        nameCol.textContent = st.label;
        const ratingCol = document.createElement('div');
        ratingCol.style.cssText = `font-size:12px;font-weight:700;color:${rColor(r)};min-width:60px;flex-shrink:0`;
        ratingCol.textContent = r ? r.charAt(0).toUpperCase() + r.slice(1) : '';
        const noteCol = document.createElement('div');
        noteCol.style.cssText = 'font-size:12px;color:#444;line-height:1.5';
        noteCol.textContent = n || '';
        row.appendChild(nameCol); row.appendChild(ratingCol); row.appendChild(noteCol);
        detail.appendChild(row);
      });

      // Additional notes not tied to rated sections
      if (h.notes) {
        const ratedIds = ratedSteps.map(s => s.id);
        const extra = Object.entries(h.notes).filter(([k, v]) => v && !ratedIds.includes(k));
        extra.forEach(([k, v]) => {
          const row = document.createElement('div');
          row.style.cssText = 'padding:6px 0;border-bottom:1px solid #f0f0f0';
          row.innerHTML = `<div style="font-size:11px;color:#888;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em">${k}</div><div style="font-size:12px;color:#444;line-height:1.5">${v}</div>`;
          detail.appendChild(row);
        });
      }
    }

    // Score summary
    if (h.strong !== undefined) {
      const slbl = document.createElement('div');
      slbl.style.cssText = 'font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin:10px 0 6px';
      slbl.textContent = 'Score';
      detail.appendChild(slbl);
      const srow = document.createElement('div');
      srow.style.cssText = 'display:flex;gap:7px;flex-wrap:wrap';
      [['Strong', h.strong||0, '#EAF3DE', '#3B6D11'], ['Caution', h.caution||0, '#FAEEDA', '#BA7517'], ['Exit', h.exits||0, '#FCEBEB', '#A32D2D']].forEach(([label, count, bg, col]) => {
        const chip = document.createElement('span');
        chip.style.cssText = `background:${bg};color:${col};font-size:12px;font-weight:600;padding:4px 12px;border-radius:6px`;
        chip.textContent = `${label}: ${count}`;
        srow.appendChild(chip);
      });
      detail.appendChild(srow);
    }

    header.onclick = () => {
      const isOpen = detail.style.display !== 'none';
      detail.style.display = isOpen ? 'none' : 'block';
      header.querySelector('.hist-chevron').textContent = isOpen ? '+' : '−';
    };

    item.appendChild(header);
    item.appendChild(detail);
    list.appendChild(item);
  });

  modal.classList.add('open');
}

function closeHistory() {
  document.getElementById('hist-modal').classList.remove('open');
}

// ── PDF EXPORT ────────────────────────────────────────────────────────────────

function generatePDF() {
  const name = S.candName || 'Candidate';
  const exp = { yes: 'Experienced', partial: 'Partial experience', no: 'No experience' }[S.hasExp] || 'Not assessed';
  const s = Object.values(S.ratings).filter(r => r === 'strong').length;
  const c = Object.values(S.ratings).filter(r => r === 'caution').length;
  const e = Object.values(S.ratings).filter(r => r === 'exit').length;
  const a = S.debriefAnswers;
  const gs = Object.values(a).filter(v => v === 'g').length;
  const rs = Object.values(a).filter(v => v === 'r').length;
  let gut = 'Pending';
  if (Object.keys(a).length >= 3) {
    if (rs >= 2) gut = 'Reject';
    else if (gs >= 4) gut = 'Move forward';
    else gut = '50/50 — second conversation';
  }
  const gutColor = { 'Move forward': '#3B6D11', 'Reject': '#A32D2D' }[gut] || '#BA7517';
  const ratedSteps = SCRIPT_DATA.steps.filter(st => st.rated);
  const ratingsHTML = ratedSteps.map(st => {
    const r = S.ratings[st.id];
    const n = S.notes[st.id];
    if (!r && !n) return '';
    const rColor = r === 'strong' ? '#3B6D11' : r === 'caution' ? '#BA7517' : '#A32D2D';
    return `<tr><td style="padding:7px 10px;font-size:13px;border-bottom:1px solid #eee;color:#333">${st.label}</td><td style="padding:7px 10px;font-size:13px;border-bottom:1px solid #eee;font-weight:600;color:${rColor}">${r ? r.charAt(0).toUpperCase() + r.slice(1) : '—'}</td><td style="padding:7px 10px;font-size:13px;border-bottom:1px solid #eee;color:#555">${n || ''}</td></tr>`;
  }).join('');
  const flagsHTML = S.flags.length ? S.flags.map(f => {
    const [bg, color] = f.color === 'green' ? ['#EAF3DE','#3B6D11'] : f.color === 'amber' ? ['#FAEEDA','#BA7517'] : ['#FCEBEB','#A32D2D'];
    const label = f.color === 'green' ? 'Green' : f.color === 'amber' ? 'Yellow' : 'Red';
    return `<span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:12px;margin:2px;background:${bg};color:${color}">${label} · ${f.step} · ${f.time}</span>`;
  }).join('') : '<span style="font-size:13px;color:#999">None</span>';
  const addNotes = Object.entries(S.notes).filter(([k, v]) => v && !ratedSteps.map(s => s.id).includes(k));
  const addNotesHTML = addNotes.length ? addNotes.map(([k, v]) => `<div style="margin-bottom:10px"><div style="font-size:11px;color:#888;margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em">${k}</div><div style="font-size:13px;color:#333">${v}</div></div>`).join('') : '<div style="font-size:13px;color:#999">None</div>';
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${name} — Interview Summary</title>
  <style>body{font-family:system-ui,sans-serif;color:#1a1a1a;padding:40px;max-width:700px;margin:0 auto}h1{font-size:22px;font-weight:700;margin-bottom:4px}h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin:24px 0 8px;border-bottom:1px solid #eee;padding-bottom:4px}table{width:100%;border-collapse:collapse}th{text-align:left;font-size:11px;color:#888;padding:6px 10px;background:#f9f9f9;border-bottom:1px solid #ddd;font-weight:600}@media print{.no-print{display:none}}</style></head><body>
  <h1>${name}</h1>
  <div style="font-size:13px;color:#888;margin-bottom:6px">${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} · Adjuster Specialist · ${exp} · Interviewed by ${S.user}</div>
  <h2>Quick flags</h2><div style="margin-bottom:4px">${flagsHTML}</div>
  <h2>Ratings & notes</h2>
  <table><tr><th>Section</th><th>Rating</th><th>Notes</th></tr>${ratingsHTML}</table>
  <h2>Score summary</h2>
  <div style="display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap">
    <div style="background:#EAF3DE;color:#3B6D11;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600">Strong: ${s}</div>
    <div style="background:#FAEEDA;color:#BA7517;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600">Caution: ${c}</div>
    <div style="background:#FCEBEB;color:#A32D2D;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600">Exit: ${e}</div>
  </div>
  <h2>Gut verdict</h2>
  <div style="font-size:18px;font-weight:700;color:${gutColor};margin-bottom:4px">${gut}</div>
  <h2>Additional notes</h2>${addNotesHTML}
  <div style="margin-top:36px;text-align:center" class="no-print"><button onclick="window.print()" style="padding:9px 22px;background:#1a1a1a;color:white;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-weight:500">Print / Save as PDF</button></div>
  </body></html>`);
  w.document.close();
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────

function renderSidebar() {
  const steps = SCRIPT_DATA.steps;
  const secs = {};
  steps.forEach((s, i) => { if (!secs[s.section]) secs[s.section] = []; secs[s.section].push({ ...s, idx: i }); });
  let html = '';
  for (const [sec, items] of Object.entries(secs)) {
    html += `<div class="sb-sec">${sec}</div>`;
    items.forEach(item => {
      const done = item.idx < S.current, active = item.idx === S.current;
      const r = S.ratings[item.id];
      const rColor = r === 'strong' ? '#3B6D11' : r === 'caution' ? '#BA7517' : '#A32D2D';
      let cls = done ? 'done' : ''; if (active) cls = 'active';
      html += `<div class="sb-item ${cls}" onclick="goTo(${item.idx})"><span class="sb-dot"></span><span style="flex:1">${item.label}</span>${r ? `<span class="sb-rating" style="color:${rColor}">${r === 'strong' ? '✓' : r === 'caution' ? '~' : '✗'}</span>` : ''}</div>`;
    });
    html += `<div class="sb-divider"></div>`;
  }
  document.getElementById('sidebar').innerHTML = html;
}

function renderStep() {
  const steps = SCRIPT_DATA.steps;
  const step = steps[S.current];
  document.getElementById('prog-fill').style.width = Math.round((S.current / (steps.length - 1)) * 100) + '%';
  const secLabels = { 'Fast filter': 'Fast filter', 'Vetting': 'Vetting', 'Close': 'Close', 'Debrief': 'Debrief' };
  const sa = document.getElementById('scroll-area');
  sa.innerHTML = `
    <div class="step-eye">${secLabels[step.section] || step.section} · ${S.current + 1} of ${steps.length}</div>
    <div class="step-title">${step.label}</div>
    ${renderStepContent(step)}
    <div class="nav-row">
      ${S.current > 0 ? `<button class="btn-sec" onclick="goTo(${S.current - 1})">← Back</button>` : ''}
      ${S.current < steps.length - 1 ? `<button class="btn-primary" onclick="goTo(${S.current + 1})">Next →</button>` : `<button class="btn-primary" style="background:var(--green)">Done</button>`}
    </div><div style="height:40px"></div>`;
  renderSidebar();
  sa.scrollTop = 0;
}

function goTo(idx) { S.current = idx; saveSession(); renderStep(); }

// ── INIT ──────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  // User buttons
  SCRIPT_DATA.users.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'user-btn';
    btn.textContent = u;
    btn.onclick = () => login(u);
    document.getElementById('user-btns').appendChild(btn);
  });

  // New interview button
  document.getElementById('new-interview-btn').onclick = () => {
    if (confirm('Start a new interview? Current session will be saved to history if you\'ve entered a name.')) {
      if (S.candName) saveCandidate();
      newSession();
    }
  };

  // Candidate name
  document.getElementById('cand-name').addEventListener('input', function () {
    S.candName = this.value;
    saveSession();
    renderStep();
  });

  // Flag buttons
  document.querySelectorAll('.flag-btn').forEach(btn => {
    btn.addEventListener('click', () => addFlag(btn.dataset.color));
  });

  // Auto-login if returning user
  const last = localStorage.getItem('proliance_lastUser');
  if (last && SCRIPT_DATA.users.includes(last)) login(last);
});

</script>
</body>
</html>
