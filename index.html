<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proliance — Adjuster Specialist Interview</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f6;--bg3:#f0efed;
  --text:#1a1a1a;--text2:#666666;--text3:#999999;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --radius:10px;--radius-sm:6px;
  --blue-bg:#E6F1FB;--blue:#185FA5;
  --green-bg:#EAF3DE;--green:#3B6D11;
  --amber-bg:#FAEEDA;--amber:#BA7517;
  --red-bg:#FCEBEB;--red:#A32D2D;
  --purple-bg:#EEEDFE;--purple:#534AB7;
  --teal-bg:#E1F5EE;--teal:#0F6E56;
  --gray-bg:#F1EFE8;--gray:#5F5E5A;
}
html,body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--bg);border:1px solid var(--border2);border-radius:14px;padding:40px 44px;width:360px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:28px}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px}
.user-btns{display:flex;flex-direction:column;gap:10px}
.user-btn{padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .13s,border-color .13s}
.user-btn:hover{background:var(--bg2);border-color:var(--blue);color:var(--blue)}
#app{display:none;flex-direction:column;position:fixed;inset:0;overflow:hidden}
#app.visible{display:flex}
.app-inner{display:flex;flex:1;overflow:hidden;min-height:0}
.topbar{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.topbar-right{display:flex;align-items:center;gap:6px}
.topbar-logo{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);white-space:nowrap}
.cand-input{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:160px;outline:none;transition:border-color .15s}
.cand-input:focus{border-color:var(--blue)}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.flag-bar{display:flex;gap:5px}
.flag-btn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-family:inherit;transition:all .13s}
.flag-btn[data-color="green"]:hover{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.flag-btn[data-color="amber"]:hover{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.flag-btn[data-color="red"]:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.hist-btn,.logout-btn{padding:5px 12px;border-radius:var(--radius-sm);font-size:12px;font-family:inherit;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2);transition:background .13s}
.hist-btn:hover,.logout-btn:hover{background:var(--bg3)}
.flags-strip{padding:5px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:none;flex-wrap:wrap;gap:5px;flex-shrink:0}
.flags-strip.visible{display:flex}
.flag-chip{font-size:11px;font-weight:500;padding:2px 9px;border-radius:10px}
.prog-bar{height:3px;background:var(--border);flex-shrink:0}
.prog-fill{height:100%;background:var(--blue);transition:width .3s ease}
#sidebar{width:220px;min-width:220px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg);flex-shrink:0}
.sb-sec{padding:12px 14px 4px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:1px 6px;border-radius:var(--radius-sm);cursor:pointer;font-size:12.5px;color:var(--text2);transition:background .12s}
.sb-item:hover{background:var(--bg2)}
.sb-item.active{background:var(--bg2);color:var(--text);font-weight:600}
.sb-dot{width:7px;height:7px;border-radius:50%;background:#d0d0cc;flex-shrink:0;transition:background .2s}
.sb-item.done .sb-dot{background:var(--green)}
.sb-item.active .sb-dot{background:var(--blue)}
.sb-rating{margin-left:auto;font-size:11px;font-weight:700}
.sb-divider{height:1px;background:var(--border);margin:5px 12px}
#scroll-area{flex:1;overflow-y:auto;padding:22px 26px 60px;background:var(--bg)}
.step-eye{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.step-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.step-subtitle{font-size:12px;color:var(--text3);margin-bottom:16px}

/* QUESTION CARD — primary visible element */
.q-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.q-num{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.q-text{font-size:15px;font-weight:600;color:var(--text);line-height:1.65;margin-bottom:10px}
.q-followup{font-size:12.5px;color:var(--blue);font-style:italic;margin-bottom:10px;padding:7px 10px;background:var(--blue-bg);border-radius:var(--radius-sm)}

/* TOGGLE ROW — for listen/note/exit/followup */
.toggle-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:2px}
.tog-btn{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text3);font-family:inherit;transition:all .13s;display:flex;align-items:center;gap:4px}
.tog-btn:hover{background:var(--bg3)}
.tog-btn.listen-tog{border-color:var(--gray);color:var(--gray)}
.tog-btn.note-tog{border-color:var(--amber);color:var(--amber)}
.tog-btn.exit-tog{border-color:var(--red);color:var(--red)}
.tog-btn.followup-tog{border-color:var(--purple);color:var(--purple)}
.tog-btn.rule-tog{border-color:var(--red);color:var(--red)}
.tog-panel{display:none;margin-top:8px;padding:10px 12px;border-radius:var(--radius-sm);font-size:12.5px;line-height:1.75}
.tog-panel.visible{display:block}
.tog-panel.listen-panel{background:var(--gray-bg);color:var(--text)}
.tog-panel.note-panel{background:var(--amber-bg);color:var(--text)}
.tog-panel.exit-panel{background:var(--red-bg);color:var(--text);font-style:italic;border-left:3px solid var(--red)}
.tog-panel.followup-panel{background:var(--purple-bg);color:var(--text)}
.tog-panel.rule-panel{background:var(--red-bg);color:var(--text);border-left:3px solid var(--red)}
.tog-panel b{color:var(--text);font-weight:700}

/* CHOICE always visible */
.choice-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:8px}
.choice-q{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.opts{display:flex;flex-wrap:wrap;gap:7px}
.opt-btn{padding:6px 13px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:13px;font-family:inherit;cursor:pointer;background:var(--bg);color:var(--text);transition:all .13s}
.opt-btn:hover{background:var(--bg3)}
.opt-btn.sel-g{border-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:700}
.opt-btn.sel-r{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:700}
.opt-btn.sel-a{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);font-weight:700}
.opt-btn.sel-b{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);font-weight:700}

.exit-block{border-left:3px solid var(--red);background:var(--red-bg);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 14px;margin-top:8px}
.exit-lbl{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.exit-say{font-size:13px;color:var(--text);line-height:1.7;font-style:italic}
.partial-note{border-left:3px solid var(--amber);background:var(--amber-bg);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-top:8px;font-size:13px;color:var(--text);line-height:1.65}
.track-badge{display:inline-flex;padding:4px 11px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;margin-bottom:13px}
.tb-exp{background:var(--blue-bg);color:var(--blue)}
.tb-partial{background:var(--teal-bg);color:var(--teal)}
.tb-noexp{background:var(--amber-bg);color:var(--amber)}

.section-header{padding:8px 0 4px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-top:6px;margin-bottom:4px;border-top:1px solid var(--border)}
.section-header:first-child{border-top:none;margin-top:0}

.rating-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.r-btn{padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:13px;font-family:inherit;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .13s}
.r-btn:hover{background:var(--bg2)}
.r-s.on{border-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:700}
.r-c.on{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);font-weight:700}
.r-e.on{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:700}
.notes-lbl{font-size:11px;font-weight:600;color:var(--text3);margin:13px 0 5px}
textarea{width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 11px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);resize:vertical;min-height:64px;line-height:1.6;outline:none;transition:border-color .15s}
textarea:focus{border-color:var(--blue)}
.nav-row{display:flex;gap:9px;margin-top:20px}
.btn-primary{padding:9px 20px;border-radius:var(--radius-sm);background:#1a1a1a;color:#fff;border:none;font-size:13px;font-family:inherit;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.82}
.btn-sec{padding:9px 14px;border-radius:var(--radius-sm);background:transparent;color:var(--text2);border:1px solid var(--border2);font-size:13px;font-family:inherit;cursor:pointer;transition:background .13s}
.btn-sec:hover{background:var(--bg2)}

/* ROLEPLAY TOGGLES */
.rp-section{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.rp-toggle{width:100%;background:var(--bg2);border:none;padding:11px 15px;text-align:left;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .13s}
.rp-toggle:hover{background:var(--bg3)}
.rp-arrow{font-size:10px;color:var(--text3);transition:transform .2s}
.rp-toggle.open .rp-arrow{transform:rotate(180deg)}
.rp-body{display:none;padding:13px 15px;border-top:1px solid var(--border)}
.rp-body.visible{display:block}
.rp-setup{background:#1a1a1a;color:#f0f0ee;border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;line-height:1.8;margin-bottom:10px}
.rp-setup b{color:#fff}
.rp-rule{border-left:3px solid var(--red);background:var(--red-bg);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:9px 12px;font-size:12.5px;color:var(--text);line-height:1.65;margin-bottom:10px}
.rp-line{font-size:14px;font-weight:600;color:var(--text);line-height:1.6;margin-bottom:10px;padding:10px 13px;background:var(--blue-bg);border-radius:var(--radius-sm);border-left:3px solid var(--blue)}
.rp-watch{font-size:12.5px;color:var(--text2);margin-bottom:8px;line-height:1.65}
.rp-watch b{color:var(--text)}
.rp-signals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.rp-pass{background:var(--green-bg);border-radius:var(--radius-sm);padding:10px 12px}
.rp-fail{background:var(--red-bg);border-radius:var(--radius-sm);padding:10px 12px}
.rp-signal-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.rp-pass .rp-signal-lbl{color:var(--green)}
.rp-fail .rp-signal-lbl{color:var(--red)}
.rp-signal-items{font-size:12px;line-height:1.8;color:var(--text)}
.rp-jolt{background:#1a1a1a;border-radius:var(--radius-sm);padding:12px 14px}
.rp-jolt-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:6px}
.rp-jolt-line{font-size:13px;color:#f0f0ee;line-height:1.7;font-style:italic;margin-bottom:8px}
.rp-jolt-tests{font-size:12px;color:#aaa;line-height:1.75}
.rp-jolt-tests b{color:#ddd}

.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}
.sum-card{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px}
.sum-lbl{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:3px}
.sum-val{font-size:17px;font-weight:700}
.debrief-q{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.db-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--purple);margin-bottom:6px}
.db-q{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.55}
.d-opts{display:flex;flex-wrap:wrap;gap:7px}
.d-btn{padding:7px 13px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:13px;font-family:inherit;cursor:pointer;background:var(--bg);color:var(--text);transition:all .13s}
.d-btn:hover{background:var(--bg2)}
.d-g{border-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:700}
.d-a{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);font-weight:700}
.d-r{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:700}
.verdict-box{border-radius:var(--radius);padding:18px 20px;margin-top:14px;border:1px solid var(--border)}
.verdict-pending{font-size:12.5px;color:var(--text3);padding:11px 14px;border:1px dashed var(--border2);border-radius:var(--radius-sm);margin-top:10px}
.pdf-btn{padding:9px 18px;border-radius:var(--radius-sm);background:var(--blue);color:#fff;border:none;font-size:13px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:14px;margin-right:8px;transition:opacity .15s}
.pdf-btn:hover{opacity:.85}
.save-cand-btn{padding:9px 18px;border-radius:var(--radius-sm);background:var(--green);color:#fff;border:none;font-size:13px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:14px;transition:opacity .15s}
.save-cand-btn:hover{opacity:.85}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius);padding:26px;width:580px;max-width:94vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.14)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);line-height:1}
.hist-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:background .13s}
.hist-item:hover{background:var(--bg2)}
.hist-name{font-size:14px;font-weight:700}
.hist-meta{font-size:12px;color:var(--text2);margin-top:3px}
.hist-empty{font-size:13px;color:var(--text3);text-align:center;padding:28px}
.comp-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:9px}
.comp-table th{text-align:left;padding:6px 10px;background:var(--bg2);color:var(--text2);font-weight:700;border-bottom:1px solid var(--border);font-size:11px}
.comp-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.up{color:var(--green);font-weight:700}.dn{color:var(--red);font-weight:700}
@media(max-width:640px){#sidebar{display:none}.cand-input{width:110px}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Proliance General Contractors</div>
    <div class="login-title">Interview Guide</div>
    <div class="login-sub">Adjuster Specialist · Select your name</div>
    <div class="user-btns" id="user-btns"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">Proliance</span>
      <input class="cand-input" id="cand-name" placeholder="Candidate name...">
      <span id="exp-pill" class="pill" style="display:none"></span>
      <span id="verdict-pill" class="pill" style="display:none"></span>
      <div class="flag-bar">
        <button class="flag-btn" data-color="green">+ Green</button>
        <button class="flag-btn" data-color="amber">+ Yellow</button>
        <button class="flag-btn" data-color="red">+ Red</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="hist-btn" onclick="openHistory()">History</button>
      <button class="hist-btn" id="new-interview-btn">+ New</button>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>
  <div class="flags-strip" id="flags-strip"></div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="app-inner">
    <div id="sidebar"></div>
    <div id="scroll-area"></div>
  </div>
</div>

<div class="modal-overlay" id="hist-modal" onclick="if(event.target===this)closeHistory()">
  <div class="modal">
    <button class="modal-close" onclick="closeHistory()">×</button>
    <div class="modal-title">Your interviews</div>
    <div id="hist-list"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
// Each step has: questions[], choices[], extras (listen/note/exit/followup per question), roleplay flag
// questions: [{num, label, text, followup?, alwaysShow?}]
// extras: [{qIdx, type:'listen'|'note'|'exit'|'followup'|'rule', text}]
// choices: [{key, question, options:[{val,label,color}]}]

const STEPS = [
  {
    id:'consent', label:'Comp check', section:'Fast Filter',
    intro: 'Before any questions — give them the comp update and get a clear yes or no.',
    questions:[
      {num:'—', label:'Comp transparency', text:'Before we go any further — I want to be upfront with you, [name]. Since you applied, we\'ve updated our compensation structure. The base moved from $900 to $800 weekly, but the performance payouts actually increased across the board. I want to make sure you have the full picture before we continue.'},
      {num:'—', label:'Check-in', text:'Are you still happy to move forward under the new structure?'},
    ],
    extras:[
      {qIdx:1, type:'listen', text:'<b>Genuine yes:</b> Asks about breakdown or says "that sounds fair."<br><b>Hesitant:</b> Long pause — walk through the comp table, then re-ask.<br><b>Hard no:</b> Exit immediately. Do not try to save it.'},
      {qIdx:1, type:'exit', text:'Totally fair, [name] — I appreciate you being upfront. No pressure at all. If anything changes, feel free to reach back out.'},
    ],
    compTable:true,
    choices:[
      {key:'showTable', question:'Did they ask about the breakdown?', options:[{val:'yes',label:'Yes — show table',color:'blue'},{val:'no',label:'No — moving on',color:'green'}]},
      {key:'consent', question:'Their response?', options:[{val:'yes',label:'Yes — proceed',color:'green'},{val:'hesitant',label:'Hesitant',color:'amber'},{val:'no',label:'No — opts out',color:'red'}]},
    ],
    exitOn:{consent:['hesitant','no']}
  },
  {
    id:'situation', label:'Situation + Intent', section:'Fast Filter',
    intro:'Section 1 — Start here. Get their current state and why they\'re actually looking.',
    questions:[
      {num:'1', label:'Current situation', text:'What\'s your situation right now — are you working, in between jobs, or actively trying to transition out of something?'},
      {num:'2', label:'Motivation / Intent', text:'Why are you exploring opportunities right now?'},
      {num:'3', label:'Role-specific motivation', text:'Why this role specifically — not just a job — but this type of work?', jolt:true},
    ],
    extras:[
      {qIdx:0, type:'listen', text:'<b>Employed and looking:</b> More selective — find the real reason fast.<br><b>In between:</b> How long, and are they getting desperate? Desperation = wrong reasons.<br><b>Transitioning:</b> Is the transition intentional or reactive?'},

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {current:0,notes:{},ratings:{},choices:{},debriefAnswers:{},candName:'',flags:[],user:null};
const idMap = {};
STEPS.forEach((s,i)=>idMap[s.id]=i);

function storageKey(k){return `prol_${S.user}_${k}`;}
function save(k,v){try{localStorage.setItem(storageKey(k),JSON.stringify(v));}catch(e){}}
function load(k,fb){try{const v=localStorage.getItem(storageKey(k));return v!==null?JSON.parse(v):fb;}catch(e){return fb;}}
function saveSession(){save('sess',{current:S.current,notes:S.notes,ratings:S.ratings,choices:S.choices,debriefAnswers:S.debriefAnswers,candName:S.candName,flags:S.flags});}
function loadSession(){const s=load('sess',null);if(s){Object.assign(S,s);document.getElementById('cand-name').value=S.candName||'';updatePills();renderFlags();}}
function saveHistory(c){const h=load('hist',[]);const i=h.findIndex(x=>x.id===c.id);if(i>=0)h[i]=c;else h.unshift(c);save('hist',h.slice(0,100));}
function loadHistory(){return load('hist',[]);}
function newSession(){S.current=0;S.notes={};S.ratings={};S.choices={};S.debriefAnswers={};S.candName='';S.flags=[];document.getElementById('cand-name').value='';updatePills();renderFlags();saveSession();goTo(0);}
function login(u){S.user=u;save('lastUser',u);document.getElementById('login-screen').style.display='none';document.getElementById('app').classList.add('visible');loadSession();renderStep();renderSidebar();}
function logout(){saveSession();S.user=null;document.getElementById('app').classList.remove('visible');document.getElementById('login-screen').style.display='flex';}
function fn(){return S.candName?S.candName.split(' ')[0]:'[name]';}
function injectName(t){return t.replace(/\[name\]/g,`<b style="color:#185FA5">${fn()}</b>`);}

function addFlag(color){const step=STEPS[S.current];S.flags.push({color,step:step.label,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});renderFlags();saveSession();}
function renderFlags(){const strip=document.getElementById('flags-strip');if(!S.flags.length){strip.classList.remove('visible');return;}strip.classList.add('visible');const cm={green:['#EAF3DE','#3B6D11','Green'],amber:['#FAEEDA','#BA7517','Yellow'],red:['#FCEBEB','#A32D2D','Red']};strip.innerHTML=S.flags.map(f=>{const[bg,c,l]=cm[f.color];return `<span class="flag-chip" style="background:${bg};color:${c}">${l} · ${f.step} · ${f.time}</span>`;}).join('');}

function updatePills(){
  const vp=document.getElementById('verdict-pill');
  const s=Object.values(S.ratings).filter(r=>r==='strong').length,c=Object.values(S.ratings).filter(r=>r==='caution').length,e=Object.values(S.ratings).filter(r=>r==='exit').length;
  if(s+c+e===0){vp.style.display='none';return;}
  vp.style.display='inline-block';
  if(e>0){vp.style.background='#FCEBEB';vp.style.color='#A32D2D';vp.textContent='Exit triggered';}
  else if(s>=5){vp.style.background='#EAF3DE';vp.style.color='#3B6D11';vp.textContent='Strong hire';}
  else if(s>=3){vp.style.background='#FAEEDA';vp.style.color='#BA7517';vp.textContent='Proceed w/ caution';}
  else{vp.style.background='#FCEBEB';vp.style.color='#A32D2D';vp.textContent='Do not proceed';}
}

// ── TOGGLE LOGIC ──────────────────────────────────────────────────────────────
function togglePanel(btn){
  const panel=btn.nextElementSibling;
  const isOpen=panel.classList.contains('visible');
  panel.classList.toggle('visible',!isOpen);
  const arrow=btn.querySelector('.tog-arrow');
  if(arrow) arrow.textContent=isOpen?'▼':'▲';
}
function toggleRP(btn){btn.classList.toggle('open');btn.nextElementSibling.classList.toggle('visible');}

// ── CARD BUILDERS ─────────────────────────────────────────────────────────────
function buildQCard(step, qObj, stepExtras){
  const extras = stepExtras.filter(e=>e.qIdx === step.questions.indexOf(qObj));
  let togglesHTML='';
  extras.forEach((ex,i)=>{
    const uid=`tog_${step.id}_${step.questions.indexOf(qObj)}_${i}`;
    const labels={listen:'Listen for',note:'Note',exit:'Exit line',followup:'If vague',rule:'Rule'};
    const clsMap={listen:'listen-tog',note:'note-tog',exit:'exit-tog',followup:'followup-tog',rule:'rule-tog'};
    const panelMap={listen:'listen-panel',note:'note-panel',exit:'exit-panel',followup:'followup-panel',rule:'rule-panel'};
    togglesHTML+=`<button class="tog-btn ${clsMap[ex.type]||''}" onclick="togglePanel(this)"><span>${labels[ex.type]||ex.type}</span><span class="tog-arrow">▼</span></button><div class="tog-panel ${panelMap[ex.type]||''}">${injectName(ex.text)}</div>`;
  });

  const isJolt = qObj.jolt ? `<span style="font-size:10px;font-weight:700;background:#1a1a1a;color:#fff;padding:1px 6px;border-radius:3px;margin-left:6px;letter-spacing:.04em">JOLT</span>` : '';
  const isHot = qObj.hot ? `<span style="font-size:10px;font-weight:700;background:var(--red-bg);color:var(--red);padding:1px 6px;border-radius:3px;margin-left:6px">KEY</span>` : '';
  const isAlways = qObj.alwaysFollowup ? `<span style="font-size:10px;font-weight:700;background:var(--purple-bg);color:var(--purple);padding:1px 6px;border-radius:3px;margin-left:6px">ALWAYS ASK</span>` : '';

  return `<div class="q-card">
    <div class="q-num">Q${qObj.num} · ${qObj.label}${isJolt}${isHot}${isAlways}</div>
    <div class="q-text">${injectName(qObj.text)}</div>
    ${togglesHTML ? `<div class="toggle-row" style="margin-top:8px">${togglesHTML}</div>` : ''}
  </div>`;
}

function choiceHTML(key,question,options){
  const cur=S.choices[key];const cm={green:'sel-g',red:'sel-r',amber:'sel-a',blue:'sel-b'};
  const btns=options.map(o=>`<button class="opt-btn ${cur===o.val?cm[o.color]||'':''}" onclick="setChoice('${key}','${o.val}')">${o.label}</button>`).join('');
  return `<div class="choice-card"><div class="choice-q">${question}</div><div class="opts">${btns}</div></div>`;
}

function ratingHTML(id){
  const r=S.ratings[id];
  return `<div style="margin-top:4px"><div style="font-size:11px;color:var(--text3);margin-bottom:5px">Your rating</div><div class="rating-row"><button class="r-btn r-s ${r==='strong'?'on':''}" onclick="rate('${id}','strong')">Strong</button><button class="r-btn r-c ${r==='caution'?'on':''}" onclick="rate('${id}','caution')">Caution</button><button class="r-btn r-e ${r==='exit'?'on':''}" onclick="rate('${id}','exit')">Exit</button></div></div>`;
}

      <div class="rp-watch"><b>Watch:</b> Intimidation response. Confidence without ego.</div>
      <div class="rp-signals">
        <div class="rp-pass"><div class="rp-signal-lbl">Pass</div><div class="rp-signal-items">"I respect that — I just want to make sure we're aligned on what's best here. Can we double-check this section together?"</div></div>
        <div class="rp-fail"><div class="rp-signal-lbl">Fail</div><div class="rp-signal-items">"Yeah you're probably right"<br>OR overly aggressive pushback</div></div>
      </div>
    </div>
  </div>
  <div class="rp-section">
    <button class="rp-toggle" onclick="toggleRP(this)"><span>Jolt round — if they respond weakly</span><span class="rp-arrow">▼</span></button>
    <div class="rp-body">
      <div class="rp-jolt">
        <div class="rp-jolt-lbl">Say this</div>
        <div class="rp-jolt-line">"I'm noticing you're agreeing pretty quickly. In this role, that could cost the homeowner. Try that again — but this time, push back a bit more."</div>
        <div class="rp-jolt-tests"><b>Tests:</b> Coachability · Real-time adjustment · Mental toughness</div>
      </div>
    </div>
  </div>`;
}

// ── STEP RENDERER ─────────────────────────────────────────────────────────────
function renderStepContent(step){
  if(step.debrief) return renderDebrief(step);
  let html='';

  // Intro
  if(step.intro) html+=`<div style="font-size:12.5px;color:var(--text2);margin-bottom:14px;padding:9px 12px;background:var(--bg2);border-radius:var(--radius-sm);line-height:1.65">${step.intro}</div>`;

  // Questions
  step.questions.forEach(q=>{
    html+=buildQCard(step, q, step.extras||[]);
  });

  // Special step content
  if(step.id==='consent') html+=renderConsentExtras(step);

  // Choices — always visible
  if(step.choices){
    step.choices.forEach(ch=>{ html+=choiceHTML(ch.key,ch.question,ch.options); });
  }

  // Exit on bad choice
  if(step.exitOn){
    Object.entries(step.exitOn).forEach(([key,vals])=>{
      if(vals.includes(S.choices[key])){
        const exitExtra=step.extras&&step.extras.find(e=>e.type==='exit');
        if(exitExtra) html+=`<div class="exit-block"><div class="exit-lbl">Exit — say this</div><div class="exit-say">${injectName(exitExtra.text)}</div></div>`;
      }
    });
  }

  // Roleplay
  if(step.roleplay) html+=roleplaysHTML();

  // Rating
  if(step.rated) html+=ratingHTML(step.id);

  // Notes
  html+=noteHTML(step.id);

  return html;
}

function renderConsentExtras(step){
  let html='';
  if(S.choices['showTable']==='yes'){
    html+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:8px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:8px">Comp comparison</div>
      <table class="comp-table">
        <tr><th></th><th>Old</th><th>New</th><th></th></tr>
        <tr><td colspan="4" style="font-size:11px;color:var(--text3);padding-top:6px;padding-bottom:2px">Salary + Commission</td></tr>
        <tr><td>Base pay</td><td>$900/wk</td><td>$800/wk</td><td class="dn">−$100</td></tr>
        <tr><td>Full approval</td><td>$100</td><td>$150</td><td class="up">+$50</td></tr>
        <tr><td>Partial approval</td><td>$50</td><td>$50</td><td style="color:var(--text3)">—</td></tr>
        <tr><td>Denial</td><td>—</td><td>$20</td><td class="up">New</td></tr>
        <tr><td colspan="4" style="font-size:11px;color:var(--text3);padding-top:10px;padding-bottom:2px">Commission Only</td></tr>
        <tr><td>Full approval</td><td>$200</td><td>$250</td><td class="up">+$50</td></tr>
        <tr><td>Partial approval</td><td>$100</td><td>$150</td><td class="up">+$50</td></tr>
        <tr><td>Denial</td><td>$50</td><td>$50</td><td style="color:var(--text3)">—</td></tr>
      </table>
    </div>`;
  }
  return html;
}

function renderDebrief(step){
  const a=S.debriefAnswers;
  const qHTML=step.dbQuestions.map(q=>{
    const cur=a[q.key];
    const btns=q.opts.map(o=>`<button class="d-btn ${cur===o.v?`d-${o.v}`:''}" onclick="setDebrief('${q.key}','${o.v}')">${o.l}</button>`).join('');
    return `<div class="debrief-q"><div class="db-lbl">Reflect</div><div class="db-q">${injectName(q.text)}</div><div class="d-opts">${btns}</div></div>`;
  }).join('');
  const answered=Object.keys(a).length;
  let verdictHTML='';
  if(answered>=3){
    const gs=Object.values(a).filter(v=>v==='g').length,rs=Object.values(a).filter(v=>v==='r').length;
    let v;
    if(rs>=2) v={bg:'#FCEBEB',c:'#A32D2D',title:'Reject',sub:`Your gut and your notes are pointing the same direction — ${fn()} is not the right fit right now. Trust that.`};
    else if(gs>=4) v={bg:'#EAF3DE',c:'#3B6D11',title:'Move forward',sub:`Across the board, ${fn()} showed up. Your instincts and the signals are aligned.`};
    else v={bg:'#FAEEDA',c:'#BA7517',title:'50/50 — needs more',sub:`There's enough to be curious, but not enough to be confident. A second conversation on the flagged areas will tell you more.`};
    verdictHTML=`<div class="verdict-box" style="background:${v.bg};border-color:${v.c}40"><div style="font-size:10px;font-weight:600;color:${v.c};text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Gut verdict</div><div style="font-size:20px;font-weight:600;color:${v.c};margin-bottom:5px">${v.title}</div><div style="font-size:13px;color:var(--text2);line-height:1.6">${v.sub}</div></div>`;
  } else {
    verdictHTML=`<div class="verdict-pending">Answer at least 3 questions to generate your verdict.</div>`;
  }
  const s=Object.values(S.ratings).filter(r=>r==='strong').length,c=Object.values(S.ratings).filter(r=>r==='caution').length,e=Object.values(S.ratings).filter(r=>r==='exit').length;
  return `<div style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">Call is done. Step back and answer honestly.</div>
  <div style="background:var(--bg2);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;display:flex;gap:16px;flex-wrap:wrap">
    <span style="font-size:13px"><span style="font-weight:700;color:var(--green)">${s}</span> <span style="color:var(--text3)">strong</span></span>
    <span style="font-size:13px"><span style="font-weight:700;color:var(--amber)">${c}</span> <span style="color:var(--text3)">caution</span></span>
    <span style="font-size:13px"><span style="font-weight:700;color:var(--red)">${e}</span> <span style="color:var(--text3)">exit</span></span>
  </div>
  ${qHTML}${verdictHTML}
  <div style="margin-top:12px"><button class="pdf-btn" onclick="generatePDF()">Export PDF</button><button class="save-cand-btn" onclick="saveCandidate()">Save to history</button></div>
  ${noteHTML('debrief')}`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setChoice(key,val){S.choices[key]=val;saveSession();renderStep();}
function setDebrief(key,val){S.debriefAnswers[key]=val;saveSession();renderStep();}
function rate(id,val){S.ratings[id]=val;saveSession();updatePills();renderStep();}

function saveCandidate(){
  if(!S.candName.trim()){alert('Enter a candidate name first.');return;}
  const s=Object.values(S.ratings).filter(r=>r==='strong').length,e=Object.values(S.ratings).filter(r=>r==='exit').length,c=Object.values(S.ratings).filter(r=>r==='caution').length;
  const a=S.debriefAnswers,gs=Object.values(a).filter(v=>v==='g').length,rs=Object.values(a).filter(v=>v==='r').length;
  let verdict='Pending';
  if(Object.keys(a).length>=3){if(rs>=2)verdict='Reject';else if(gs>=4)verdict='Move forward';else verdict='50/50';}
  saveHistory({id:Date.now(),name:S.candName,date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),interviewer:S.user||'',strong:s,caution:c,exits:e,verdict,notes:{...S.notes},ratings:{...S.ratings},flags:[...(S.flags||[])]});
  alert(`${S.candName} saved.`);
}

function openHistory(){
  const hist=loadHistory(),modal=document.getElementById('hist-modal'),list=document.getElementById('hist-list');
  if(!hist.length){list.innerHTML='<div class="hist-empty">No interviews saved yet.</div>';modal.classList.add('open');return;}
  const vColors={'Move forward':'#3B6D11','Reject':'#A32D2D','50/50':'#BA7517','Pending':'#999'};
  const rColor=r=>r==='strong'?'#3B6D11':r==='caution'?'#BA7517':'#A32D2D';
  list.innerHTML='';
  hist.forEach(h=>{
    const item=document.createElement('div');item.className='hist-item';
    const vc=vColors[h.verdict]||'#999';
    const header=document.createElement('div');
    header.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:8px"><div class="hist-name">${h.name||'Unnamed'}</div><span style="font-size:11px;font-weight:600;color:${vc}">${h.verdict||'Pending'}</span></div><span style="font-size:18px;color:#aaa" class="hist-chevron">+</span></div><div class="hist-meta">${h.date||''}${h.interviewer?' · '+h.interviewer:''} · ${h.strong||0} strong · ${h.exits||0} exits</div>`;
    const detail=document.createElement('div');detail.style.cssText='display:none;margin-top:12px;padding-top:12px;border-top:1px solid #eee';
    const ratedSteps=STEPS.filter(st=>st.rated);
    ratedSteps.forEach(st=>{const r=h.ratings&&h.ratings[st.id],n=h.notes&&h.notes[st.id];if(!r&&!n)return;const row=document.createElement('div');row.style.cssText='display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f0f0f0';const nc=document.createElement('div');nc.style.cssText='font-size:12px;color:#555;min-width:130px;flex-shrink:0';nc.textContent=st.label;const rc=document.createElement('div');rc.style.cssText=`font-size:12px;font-weight:700;color:${rColor(r)};min-width:60px;flex-shrink:0`;rc.textContent=r?r.charAt(0).toUpperCase()+r.slice(1):'';const notec=document.createElement('div');notec.style.cssText='font-size:12px;color:#444;line-height:1.5';notec.textContent=n||'';row.appendChild(nc);row.appendChild(rc);row.appendChild(notec);detail.appendChild(row);});
    header.onclick=()=>{const isOpen=detail.style.display!=='none';detail.style.display=isOpen?'none':'block';header.querySelector('.hist-chevron').textContent=isOpen?'+':'−';};
    item.appendChild(header);item.appendChild(detail);list.appendChild(item);
  });
  modal.classList.add('open');
}
function closeHistory(){document.getElementById('hist-modal').classList.remove('open');}

function generatePDF(){
  const name=S.candName||'Candidate';
  const s=Object.values(S.ratings).filter(r=>r==='strong').length,c=Object.values(S.ratings).filter(r=>r==='caution').length,e=Object.values(S.ratings).filter(r=>r==='exit').length;
  const a=S.debriefAnswers,gs=Object.values(a).filter(v=>v==='g').length,rs=Object.values(a).filter(v=>v==='r').length;
  let gut='Pending';if(Object.keys(a).length>=3){if(rs>=2)gut='Reject';else if(gs>=4)gut='Move forward';else gut='50/50';}
  const gutColor={'Move forward':'#3B6D11','Reject':'#A32D2D'}[gut]||'#BA7517';
  const ratedSteps=STEPS.filter(st=>st.rated);
  const ratingsHTML=ratedSteps.map(st=>{const r=S.ratings[st.id],n=S.notes[st.id];if(!r&&!n)return '';const rc=r==='strong'?'#3B6D11':r==='caution'?'#BA7517':'#A32D2D';return `<tr><td style="padding:7px 10px;font-size:13px;border-bottom:1px solid #eee">${st.label}</td><td style="padding:7px 10px;font-size:13px;font-weight:600;color:${rc};border-bottom:1px solid #eee">${r?r.charAt(0).toUpperCase()+r.slice(1):'—'}</td><td style="padding:7px 10px;font-size:13px;border-bottom:1px solid #eee;color:#555">${n||''}</td></tr>`;}).join('');
  const flagsHTML=S.flags.length?S.flags.map(f=>{const[bg,col]=f.color==='green'?['#EAF3DE','#3B6D11']:f.color==='amber'?['#FAEEDA','#BA7517']:['#FCEBEB','#A32D2D'];const l=f.color==='green'?'Green':f.color==='amber'?'Yellow':'Red';return `<span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:12px;margin:2px;background:${bg};color:${col}">${l} · ${f.step} · ${f.time}</span>`;}).join(''):'None';
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${name}</title><style>body{font-family:system-ui,sans-serif;padding:40px;max-width:700px;margin:0 auto}h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin:24px 0 8px;border-bottom:1px solid #eee;padding-bottom:4px}table{width:100%;border-collapse:collapse}th{text-align:left;font-size:11px;color:#888;padding:6px 10px;background:#f9f9f9;border-bottom:1px solid #ddd}@media print{.np{display:none}}</style></head><body><h1 style="font-size:22px;font-weight:700">${name}</h1><p style="font-size:13px;color:#888">${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} · Adjuster Specialist · ${S.user}</p><h2>Flags</h2><div>${flagsHTML}</div><h2>Ratings</h2><table><tr><th>Section</th><th>Rating</th><th>Notes</th></tr>${ratingsHTML}</table><h2>Score</h2><div style="display:flex;gap:10px;flex-wrap:wrap"><div style="background:#EAF3DE;color:#3B6D11;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600">Strong: ${s}</div><div style="background:#FAEEDA;color:#BA7517;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600">Caution: ${c}</div><div style="background:#FCEBEB;color:#A32D2D;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600">Exit: ${e}</div></div><h2>Verdict</h2><div style="font-size:18px;font-weight:700;color:${gutColor}">${gut}</div><div style="margin-top:36px;text-align:center" class="np"><button onclick="window.print()" style="padding:9px 22px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer">Print / Save PDF</button></div></body></html>`);
  w.document.close();
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function renderSidebar(){
  const secs={};
  STEPS.forEach((s,i)=>{if(!secs[s.section])secs[s.section]=[];secs[s.section].push({...s,idx:i});});
  let html='';
  for(const[sec,items] of Object.entries(secs)){
    html+=`<div class="sb-sec">${sec}</div>`;
    items.forEach(item=>{
      const done=item.idx<S.current,active=item.idx===S.current;
      const r=S.ratings[item.id];const rc=r==='strong'?'#3B6D11':r==='caution'?'#BA7517':'#A32D2D';
      let cls=done?'done':'';if(active)cls='active';
      html+=`<div class="sb-item ${cls}" onclick="goTo(${item.idx})"><span class="sb-dot"></span><span style="flex:1">${item.label}</span>${r?`<span class="sb-rating" style="color:${rc}">${r==='strong'?'✓':r==='caution'?'~':'✗'}</span>`:''}</div>`;
    });
    html+=`<div class="sb-divider"></div>`;
  }
  document.getElementById('sidebar').innerHTML=html;
}

function renderStep(){
  const step=STEPS[S.current];
  document.getElementById('prog-fill').style.width=Math.round((S.current/(STEPS.length-1))*100)+'%';
  const sa=document.getElementById('scroll-area');
  sa.innerHTML=`
    <div class="step-eye">${step.section} · ${S.current+1} of ${STEPS.length}</div>
    <div class="step-title">${step.label}</div>
    ${renderStepContent(step)}
    <div class="nav-row">
      ${S.current>0?`<button class="btn-sec" onclick="goTo(${S.current-1})">← Back</button>`:''}
      ${S.current<STEPS.length-1?`<button class="btn-primary" onclick="goTo(${S.current+1})">Next →</button>`:`<button class="btn-primary" style="background:var(--green)">Done</button>`}
    </div><div style="height:40px"></div>`;
  renderSidebar();sa.scrollTop=0;
}

function goTo(idx){S.current=idx;saveSession();renderStep();}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  USERS.forEach(u=>{const btn=document.createElement('button');btn.className='user-btn';btn.textContent=u;btn.onclick=()=>login(u);document.getElementById('user-btns').appendChild(btn);});
  document.getElementById('new-interview-btn').onclick=()=>{if(confirm('Start a new interview?')){if(S.candName)saveCandidate();newSession();}};
  document.getElementById('cand-name').addEventListener('input',function(){S.candName=this.value;saveSession();renderStep();});
  document.querySelectorAll('.flag-btn').forEach(btn=>{btn.addEventListener('click',()=>addFlag(btn.dataset.color));});
  const last=localStorage.getItem('prol_lastUser');
  if(last&&USERS.includes(last))login(last);
});
</script>
</body>
